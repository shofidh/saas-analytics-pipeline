version: 2

models:
  - name: mart_mrr_monthly
    description: "Monthly MRR aggregation by plan tier — active, new, and churned accounts + revenue"
    columns:
      - name: year
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: plan_tier
        tests: [not_null]
      - name: total_mrr
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: total_arr
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: active_accounts
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: mart_churn_summary
    description: "Monthly churn summary by reason code — count, refunds, reactivations, churn rate %"
    columns:
      - name: year
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: reason_code
        tests: [not_null]
      - name: churn_count
        tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: total_refund_usd
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: churn_rate_pct
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: mart_feature_usage_summary
    description: "Monthly feature usage aggregation by feature name"
    columns:
      - name: year
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: feature_name
        tests: [not_null]
      - name: total_usage_count
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: unique_subscriptions
        tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: mart_customer_health_score
    description: "Per-account customer health score (0–100) with churn risk classification"
    columns:
      - name: account_id
        tests: [unique, not_null]
      - name: health_score
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
          - dbt_utils.expression_is_true:
              expression: "<= 100"
      - name: churn_risk
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high']
      - name: mrr_last_month
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
