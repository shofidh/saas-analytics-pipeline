

services:

  # ── MinIO — S3-compatible Object Storage (Data Lake) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio-saas
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    networks:
      - saas-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MinIO Init — Create default bucket on startup ───────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init-saas
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio-saas:9000 admin password123 &&
        mc mb --ignore-existing local/saas-raw &&
        echo 'Bucket saas-raw ready.' &&
        exit 0
      "
    networks:
      - saas-net

  # ── ClickHouse — Analytical Warehouse ──────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-saas
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP interface (clickhouse-connect / dbt)
      - "9009:9000" # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./airflow/sql/ddl_warehouse.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - saas-net
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Python ETL Container ────────────────────────────────────────────────────
  python-etl:
    build: ./python
    container_name: python-saas
    environment:
      # ClickHouse
      CH_HOST: clickhouse-saas
      CH_PORT: "8123"
      CH_USER: default
      CH_PASSWORD: password123
      # MinIO
      MINIO_ENDPOINT: minio-saas:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: saas-raw
      MINIO_SECURE: "false"
      # Paths
      RAW_DATA_DIR: /app/data/raw_data
      WATERMARK_DIR: /app/data/watermarks
      SCRIPTS_DIR: /app
    volumes:
      - ./data:/app/data            # raw_data/ + watermarks/ live here
      - ./python:/app               # mount scripts so edits apply without rebuild
    working_dir: /app
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - saas-net

  # ── Airflow — Init (one-shot: DB migrate + create admin user) ────────────────
  airflow-init:
    build: ./airflow
    container_name: airflow-init-saas
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password password123 || true &&
        echo "Airflow init complete."
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      # ClickHouse
      CH_HOST: clickhouse-saas
      CH_PORT: "8123"
      CH_USER: default
      CH_PASSWORD: password123
      # MinIO
      MINIO_ENDPOINT: minio-saas:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: saas-raw
      MINIO_SECURE: "false"
      # Paths
      RAW_DATA_DIR: /app/data/raw_data
      WATERMARK_DIR: /app/data/watermarks
      SCRIPTS_DIR: /app
    volumes: &airflow-vols
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/app/data
      - ./python:/app
      - ./dbt:/opt/dbt                 # dbt project for dbt_run_marts task
      - airflow_data:/opt/airflow      # shared DB file between webserver + scheduler
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - saas-net

  # ── Airflow — Webserver (UI on port 8080) ──────────────────────────────────
  airflow-webserver:
    build: ./airflow
    container_name: airflow-saas
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment: *airflow-env
    volumes: *airflow-vols
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - saas-net

  # ── Airflow — Scheduler (runs DAG tasks) ───────────────────────────────────
  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler-saas
    command: scheduler
    restart: unless-stopped
    environment: *airflow-env
    volumes: *airflow-vols
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - saas-net

  # ── dbt — Data Mart Transformations ────────────────────────────────────────
  dbt:
    build: ./dbt
    container_name: dbt-saas
    environment:
      CH_HOST: clickhouse-saas
      CH_PORT: "8123"
      CH_USER: default
      CH_PASSWORD: password123
    volumes:
      - ./dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - saas-net
    # Override CMD so container stays up for dbt exec
    command: [ "tail", "-f", "/dev/null" ]

  # ── Metabase — Business Intelligence ───────────────────────────────────────
  metabase:
    image: metabase/metabase
    container_name: metabase-saas
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - saas-net

volumes:
  clickhouse_data:
  minio_data:
  airflow_data:

networks:
  saas-net:
    driver: bridge
